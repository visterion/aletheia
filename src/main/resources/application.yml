spring:
  application:
    name: aletheia

  datasource:
    url: ${ALETHEIA_DB_URL:jdbc:postgresql://localhost:5432/aletheia}
    username: ${ALETHEIA_DB_USER:aletheia}
    password: ${ALETHEIA_DB_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Owner creds (spec §6/§7): Flyway needs CREATE/ALTER DDL, so it runs as aletheia_owner,
    # not aletheia_app or aletheia_ro. The existing single aletheia/aletheia role maps to
    # aletheia_owner until the three-role split lands (Task 8).
    url: ${ALETHEIA_DB_URL:jdbc:postgresql://localhost:5432/aletheia}
    user: ${ALETHEIA_DB_USER:aletheia}
    password: ${ALETHEIA_DB_PASSWORD}

  ai:
    mcp:
      server:
        name: aletheia
        version: 0.1.0
        # Streamable HTTP transport, same shape as HiveMem/Agora
        protocol: STREAMABLE
        instructions: >-
          Before your first action, call the wake_up tool to load this customer's
          operating guide, their preferences, and the current state. Follow the operating
          guide. When you learn a durable customer preference, record it with
          update_preferences.

  servlet:
    multipart:
      max-file-size: ${ALETHEIA_INGEST_MULTIPART_MAX:40MB}
      max-request-size: ${ALETHEIA_INGEST_MULTIPART_MAX:40MB}

aletheia:
  paypal:
    # PayPal SEPA creditor-id allowlist for #29 transparency. Empty by default (no literal ID
    # committed); prod sets the real IDs, region-extensible (PayPal Europe/US/...).
    creditor-ids: ${ALETHEIA_PAYPAL_CREDITOR_IDS:}
  ingest:
    dir: ${ALETHEIA_INGEST_DIR:exports}
    max-file-size: ${ALETHEIA_INGEST_MAX_FILE_SIZE:32MB}
    # app:/ro: blocks below are UNCHANGED (do not fix here - separate task)
    # Two datasources (spec §6/§7). Both default to empty so DataSourceConfig's fallback chain
    # (explicit props -> @ServiceConnection JdbcConnectionDetails -> spring.datasource.*) applies:
    # in prod set the env vars below; in single-datasource/test setups the fallback keeps working.
    app:
      # aletheia_app: SELECT+INSERT on transactions, full DML on register/auth tables. Falls back
      # to spring.datasource.* (the app creds today) until the three-role split (Task 8).
      url: ${ALETHEIA_APP_DB_URL:}
      username: ${ALETHEIA_APP_DB_USER:}
      password: ${ALETHEIA_APP_DB_PASSWORD:}
    ro:
      # aletheia_ro: GRANT SELECT only. Used exclusively by the sql_query MCP tool so a
      # prompt-injected query cannot write, even if the tool-layer SELECT-only check is bypassed.
      # In prod this MUST be set to the dedicated read-only role (ALETHEIA_RO_DB_*).
      url: ${ALETHEIA_RO_DB_URL:}
      username: ${ALETHEIA_RO_DB_USER:}
      password: ${ALETHEIA_RO_DB_PASSWORD:}

server:
  port: ${ALETHEIA_PORT:8431}

logging:
  level:
    de.visterion.aletheia: INFO
